<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>投資ダッシュボード</title>
</head>
<body>

<h1>投資ダッシュボード</h1>

<input type="text" id="tickers" placeholder="例: 7203,6758,AAPL">
<button onclick="loadStocks()">取得</button>

<table border="1">
<thead>
<tr>
<th>銘柄</th>
<th>株価</th>
<th>高値</th>
<th>安値</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
const API_KEY = "d8pvan9r01qr03ncira0d8pvan9r01qr03ncirag";

async function loadStocks() {
  const input = document.getElementById("tickers").value;
  const tickers = input.split(",");

  const table = document.getElementById("table");
  table.innerHTML = "";

  for (let t of tickers) {
    t = t.trim();

    let price, high, low;

    try {
      // 日本株
      if (/^\d{4}$/.test(t)) {
        const url = `https://stooq.com/q/l/?s=${t}.jp&f=sd2t2ohlcv&h&e=csv`;
        const res = await fetch(url);
        const text = await res.text();
        const row = text.split("\n")[1].split(",");

        price = row[6];
        high = row[4];
        low = row[5];

      } else {
        // 米株
        const url = `https://finnhub.io/api/v1/quote?symbol=${t}&token=${API_KEY}`;
        const res = await fetch(url);
        const data = await res.json();

        price = data.c;
        high = data.h;
        low = data.l;
      }

      table.innerHTML += `
        <tr>
          <td>${t}</td>
          <td>${price}</td>
          <td>${high}</td>
          <td>${low}</td>
        </tr>
      `;

    } catch (e) {
      table.innerHTML += `
        <tr>
          <td>${t}</td>
          <td colspan="3">エラー</td>
        </tr>
      `;
    }
  }
}
</script>

</body>
</html>
