<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>投資ダッシュボード</title>
</head>
<body>

<h1>投資ダッシュボード</h1>

<input type="text" id="tickers" placeholder="例: 7203,6758,AAPL">
<button onclick="loadStocks()">取得</button>

<table border="1">
<thead>
<tr>
<th>銘柄</th>
<th>株価</th>
<th>高値</th>
<th>安値</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
const API_KEY = "d8pvan9r01qr03ncira0d8pvan9r01qr03ncirag";

async function loadStocks() {
  const input = document.getElementById("tickers").value;
  const tickers = input.split(",");

  const table = document.getElementById("table");
  table.innerHTML = "";

  for (let t of tickers) {
    t = t.trim();

    let symbol = t;

    // 日本株変換（7203 → TSE:7203）
    if (/^\d{4}$/.test(t)) {
      symbol = "TSE:" + t;
    }

    try {
      const url = `https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${API_KEY}`;

      const res = await fetch(url);
      const data = await res.json();

      if (!data.c) {
        throw new Error("データなし");
      }

      table.innerHTML += `
        <tr>
          <td>${t}</td>
          <td>${data.c}</td>
          <td>${data.h}</td>
          <td>${data.l}</td>
        </tr>
      `;

    } catch (e) {
      table.innerHTML += `
        <tr>
          <td>${t}</td>
          <td colspan="3">エラー</td>
        </tr>
      `;
    }
  }
}
</script>

</body>
</html>
