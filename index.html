<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>株価アプリ</title>
</head>
<body>
  <h1>株価チェック</h1>

  <input type="text" id="ticker" placeholder="例: 7203.T">
  <button onclick="getStock()">取得</button>

  <div id="result"></div>

  <script>
    async function getStock() {
      const ticker = document.getElementById("ticker").value;

      const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${ticker}`;

      const res = await fetch(url);
      const data = await res.json();

      const stock = data.quoteResponse.result[0];

      document.getElementById("result").innerHTML = `
        <p>株価: ${stock.regularMarketPrice}</p>
        <p>52週高値: ${stock.fiftyTwoWeekHigh}</p>
        <p>52週安値: ${stock.fiftyTwoWeekLow}</p>
        <p>配当利回り: ${stock.dividendYield}</p>
      `;
    }
  </script>
</body>
</html>
