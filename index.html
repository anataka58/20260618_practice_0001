<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>株価アプリ</title>
</head>
<body>

  <h1>株価チェック</h1>

  <input type="text" id="ticker" placeholder="例: AAPL or 7203.T">
  <button onclick="getStock()">取得</button>

  <div id="result"></div>

  <script>
    const API_KEY = "ここにあなたのAPIキー";

    async function getStock() {
      try {
        let ticker = document.getElementById("ticker").value.trim();

        // 日本株対応（7203 → 7203.T）
        if (/^\d{4}$/.test(ticker)) {
          ticker = ticker + ".T";
        }

        // Finnhubは .T じゃなく .TSE の場合あり
        ticker = ticker.replace(".T", ".TSE");

        const url = `https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${API_KEY}`;

        const res = await fetch(url);
        const data = await res.json();

        if (!data.c) {
          document.getElementById("result").innerHTML =
            "データ取得失敗（銘柄 or API制限）";
          return;
        }

        document.getElementById("result").innerHTML = `
          <p>現在株価: ${data.c}</p>
          <p>高値: ${data.h}</p>
          <p>安値: ${data.l}</p>
          <p>前日終値: ${data.pc}</p>
        `;

      } catch (e) {
        document.getElementById("result").innerHTML =
          "エラー：" + e.message;
      }
    }
  </script>

</body>
</html>
